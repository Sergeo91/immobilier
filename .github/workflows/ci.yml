# GitHub Actions CI/CD - Achat Location SaaS
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/achat_location
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret-min-32-chars-required
          JWT_REFRESH_SECRET: test-refresh-secret-32-chars-min
          NEXT_PUBLIC_APP_URL: http://localhost:3000
